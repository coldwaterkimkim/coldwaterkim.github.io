<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Login — coldwaterkim Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body class="admin-body">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                ★ coldwaterkim ADMIN LOGIN ★
            </div>
            <div class="login-body">
                <div id="alert" class="alert" style="display: none;"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required autocomplete="current-password">
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary" style="width: 100%;">
                            🔐 LOGIN
                        </button>
                    </div>
                </form>

                <p style="text-align: center; font-size: 12px; color: #666; margin-top: 16px;">
                    <a href="../index.html">← Back to Home</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { isLoggedIn, login, cmsErrorMessage } from '../js/pb.js';

        // 이미 로그인되어 있으면 대시보드로 이동
        if (isLoggedIn()) {
            window.location.replace('/admin/');
            await new Promise(() => { });
        }

        const form = document.getElementById('loginForm');
        const alertEl = document.getElementById('alert');

        function showAlert(message, type) {
            alertEl.textContent = message;
            alertEl.className = `alert alert-${type}`;
            alertEl.style.display = 'block';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await login(email, password);
                showAlert('로그인 성공! 이동 중...', 'success');
                setTimeout(() => {
                    window.location.href = '/admin/';
                }, 500);
            } catch (err) {
                showAlert('로그인 실패: ' + cmsErrorMessage(err), 'error');
            }
        });
    </script>
</body>

</html>
