<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>글 관리 — coldwaterkim OWNER MODE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../css/admin.css">
    <!-- Quill Editor -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
    <style>
        .ql-editor {
            min-height: 300px;
            font-family: "Georgia", serif;
            font-size: 16px;
        }
    </style>
</head>

<body class="admin-body">
    <div class="admin-container">
        <!-- Header -->
        <div class="admin-header">
            <h1>★ coldwaterkim OWNER MODE ★</h1>
            <div>
                <a href="../index.html">🏠 홈으로</a> |
                <a href="#" id="logoutBtn">🚪 로그아웃</a>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="admin-nav">
            <a href="/">🏠 사이트 보기</a>
            <a href="/admin/posts.html" class="active">📝 글 관리</a>
            <a href="/admin/media.html">🖼️ 미디어</a>
            <a href="/admin/guestbook.html">💬 방명록</a>
        </nav>

        <!-- Content -->
        <div class="admin-content">
            <div id="alert" class="alert" style="display: none;"></div>

            <!-- 글 목록 뷰 -->
            <div id="listView">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h2 style="margin: 0;">📝 글 목록</h2>
                    <button class="btn btn-primary" onclick="showEditor()">✚ 새 글 쓰기</button>
                </div>

                <table class="admin-table" id="postsTable">
                    <thead>
                        <tr>
                            <th>제목</th>
                            <th style="width: 80px;">상태</th>
                            <th style="width: 120px;">날짜</th>
                            <th style="width: 140px;">액션</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="4" class="loading">불러오는 중</td>
                        </tr>
                    </tbody>
                </table>

                <div class="pagination" id="pagination"></div>
            </div>

            <!-- 에디터 뷰 -->
            <div id="editorView" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h2 style="margin: 0;" id="editorTitle">✍️ 새 글 쓰기</h2>
                    <button class="btn" onclick="showList()">← 목록으로</button>
                </div>

                <form id="postForm">
                    <input type="hidden" id="postId">
                    <input type="hidden" id="slug">
                    <input type="hidden" id="status" value="draft">

                    <div class="admin-panel">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="title">제목 *</label>
                                <input type="text" id="title" required placeholder="멋진 제목을 입력하세요">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="published_at">발행일</label>
                                <input type="date" id="published_at">
                            </div>
                        </div>
                    </div>

                    <div class="admin-panel">
                        <h2>본문</h2>
                        <div class="editor-container">
                            <div id="editor"></div>
                        </div>
                        <input type="file" id="editorImageInput" accept="image/*" multiple hidden>
                        <div id="editorImageStatus" class="editor-image-status" aria-live="polite"></div>
                    </div>

                    <div class="admin-panel">
                        <h2>🖼️ 대표 이미지</h2>
                        <div id="featuredImagePreview" class="featured-image-preview"></div>
                        <div id="featuredImageControls" class="featured-image-controls"></div>
                    </div>

                    <div class="action-buttons">
                        <button type="submit" class="btn btn-primary">💾 저장</button>
                        <button type="button" class="btn btn-success" onclick="saveAndPublish()">🚀 저장 후 발행</button>
                        <button type="button" class="btn btn-danger" id="deleteBtn" style="display: none;"
                            onclick="deleteCurrentPost()">🗑️ 삭제</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Quill JS -->
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>

    <script type="module">
        import { pb, isLoggedIn, logout, getAllPosts, deletePost, formatDate, slugify, cmsErrorMessage, uploadMedia, getMediaUrl, extractImageUrlsFromHtml, normalizeFeaturedImageMode } from '../js/pb.js';

        // 인증 체크
        if (!isLoggedIn()) {
            window.location.replace('/admin/login.html');
            await new Promise(() => { });
        }

        // 로그아웃
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
            window.location.href = '/admin/login.html';
        });

        // Quill 에디터 초기화
        const quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: '여기에 글을 작성하세요...',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                    ['blockquote', 'code-block'],
                    ['link', 'image'],
                    ['clean']
                ]
            }
        });

        const editorContainer = document.querySelector('.editor-container');
        const editorImageInput = document.getElementById('editorImageInput');
        const editorImageStatus = document.getElementById('editorImageStatus');
        const editorImageMimeTypes = new Set(['image/jpeg', 'image/png', 'image/gif', 'image/webp']);
        let pendingEditorImageIndex = null;

        // 이미지 핸들러 커스터마이즈 - 파일 업로드 후 본문에 자동 삽입
        const toolbar = quill.getModule('toolbar');
        toolbar.addHandler('image', () => {
            pendingEditorImageIndex = currentEditorIndex();
            editorImageInput.click();
        });

        editorImageInput.addEventListener('change', async () => {
            await insertEditorImages(editorImageInput.files, {
                index: pendingEditorImageIndex
            });
            pendingEditorImageIndex = null;
            editorImageInput.value = '';
        });

        editorContainer.addEventListener('dragenter', (event) => {
            if (!hasImageTransfer(event.dataTransfer)) return;
            event.preventDefault();
            editorContainer.classList.add('is-image-dragover');
        });

        editorContainer.addEventListener('dragover', (event) => {
            if (!hasImageTransfer(event.dataTransfer)) return;
            event.preventDefault();
            editorContainer.classList.add('is-image-dragover');
        });

        editorContainer.addEventListener('dragleave', (event) => {
            if (event.relatedTarget instanceof Node && editorContainer.contains(event.relatedTarget)) return;
            editorContainer.classList.remove('is-image-dragover');
        });

        editorContainer.addEventListener('drop', async (event) => {
            if (!hasImageTransfer(event.dataTransfer)) return;
            event.preventDefault();
            event.stopPropagation();
            editorContainer.classList.remove('is-image-dragover');

            const imageFiles = imageFilesFromTransfer(event.dataTransfer);
            if (!imageFiles.length) {
                showAlert('JPG, PNG, GIF, WebP 이미지만 본문에 넣을 수 있습니다.', 'error');
                return;
            }

            await insertEditorImages(imageFiles, {
                index: editorIndexFromPoint(event.clientX, event.clientY)
            });
        }, true);

        quill.root.addEventListener('paste', async (event) => {
            if (!hasImageTransfer(event.clipboardData)) return;
            event.preventDefault();
            event.stopPropagation();

            const imageFiles = imageFilesFromTransfer(event.clipboardData);
            if (!imageFiles.length) {
                showAlert('JPG, PNG, GIF, WebP 이미지만 본문에 넣을 수 있습니다.', 'error');
                return;
            }

            await insertEditorImages(imageFiles, {
                index: currentEditorIndex()
            });
        }, true);

        // 상태 변수
        let currentPage = 1;
        let editingPostId = null;
        let featuredImageMode = 'auto';
        let selectedFeaturedImageUrl = '';
        let featuredImageRenderTimer = null;

        // 페이지 함수들을 전역으로 노출
        window.showEditor = showEditor;
        window.showList = showList;
        window.editPost = editPost;
        window.confirmDelete = confirmDelete;
        window.saveAndPublish = saveAndPublish;
        window.deleteCurrentPost = deleteCurrentPost;
        window.goToPage = goToPage;

        // 알림 표시
        function showAlert(message, type) {
            const alertEl = document.getElementById('alert');
            alertEl.textContent = message;
            alertEl.className = `alert alert-${type}`;
            alertEl.style.display = 'block';
            setTimeout(() => alertEl.style.display = 'none', 5000);
        }

        function setEditorImageStatus(message = '', type = 'info') {
            editorImageStatus.textContent = message;
            editorImageStatus.className = `editor-image-status editor-image-status-${type}`;
            editorImageStatus.classList.toggle('is-visible', Boolean(message));
        }

        function isSupportedEditorImage(file) {
            return file && editorImageMimeTypes.has(file.type);
        }

        function hasImageTransfer(dataTransfer) {
            if (!dataTransfer) return false;

            return Array.from(dataTransfer.items || []).some(item => item.type?.startsWith('image/'))
                || Array.from(dataTransfer.files || []).some(file => file.type?.startsWith('image/'));
        }

        function imageFilesFromTransfer(dataTransfer) {
            if (!dataTransfer) return [];

            const files = Array.from(dataTransfer.files || []);
            const itemFiles = Array.from(dataTransfer.items || [])
                .filter(item => item.kind === 'file' && item.type?.startsWith('image/'))
                .map(item => item.getAsFile())
                .filter(Boolean);

            return [...files, ...itemFiles]
                .filter((file, index, allFiles) => {
                    if (!isSupportedEditorImage(file)) return false;
                    return allFiles.findIndex(candidate =>
                        candidate.name === file.name
                        && candidate.size === file.size
                        && candidate.lastModified === file.lastModified
                    ) === index;
                })
                .map((file, index) => namedImageFile(file, index));
        }

        function namedImageFile(file, index) {
            if (file.name) return file;

            const extensionByType = {
                'image/jpeg': 'jpg',
                'image/png': 'png',
                'image/gif': 'gif',
                'image/webp': 'webp'
            };
            const extension = extensionByType[file.type] || 'png';

            return new File([file], `editor-image-${Date.now()}-${index + 1}.${extension}`, {
                type: file.type
            });
        }

        function clampEditorIndex(index) {
            const maxIndex = Math.max(0, quill.getLength() - 1);
            if (!Number.isFinite(index)) return maxIndex;
            return Math.min(Math.max(0, index), maxIndex);
        }

        function currentEditorIndex() {
            const range = quill.getSelection(true);
            return clampEditorIndex(range?.index);
        }

        function editorIndexFromPoint(x, y) {
            const range = document.caretRangeFromPoint
                ? document.caretRangeFromPoint(x, y)
                : null;
            const position = !range && document.caretPositionFromPoint
                ? document.caretPositionFromPoint(x, y)
                : null;

            const node = range?.startContainer || position?.offsetNode;
            const offset = range?.startOffset ?? position?.offset;
            if (!node) return currentEditorIndex();

            const blot = Quill.find(node, true);
            if (!blot) return currentEditorIndex();

            let index = quill.getIndex(blot);
            if (typeof blot.index === 'function') {
                index += blot.index(node, offset);
            } else {
                index += offset || 0;
            }

            return clampEditorIndex(index);
        }

        async function insertEditorImages(files, options = {}) {
            const imageFiles = Array.from(files || [])
                .filter(isSupportedEditorImage)
                .map((file, index) => namedImageFile(file, index));

            if (!imageFiles.length) {
                showAlert('JPG, PNG, GIF, WebP 이미지만 본문에 넣을 수 있습니다.', 'error');
                return;
            }

            let insertIndex = clampEditorIndex(options.index);
            let uploadedCount = 0;
            editorContainer.classList.add('is-image-uploading');

            for (let i = 0; i < imageFiles.length; i += 1) {
                const file = imageFiles[i];
                setEditorImageStatus(`이미지 업로드 중... (${i + 1}/${imageFiles.length}) ${file.name}`);

                try {
                    const media = await uploadMedia(file);
                    const url = getMediaUrl(media, media.file);
                    quill.insertEmbed(insertIndex, 'image', url, 'user');
                    insertIndex += 1;
                    quill.insertText(insertIndex, '\n', 'user');
                    insertIndex += 1;
                    uploadedCount += 1;
                } catch (e) {
                    showAlert(`본문 이미지 업로드 실패 (${file.name}): ${cmsErrorMessage(e)}`, 'error');
                }
            }

            editorContainer.classList.remove('is-image-uploading');

            if (uploadedCount > 0) {
                quill.setSelection(insertIndex, 0, 'silent');
                renderFeaturedImageControls();
                setEditorImageStatus(`${uploadedCount}개 이미지가 본문에 들어갔습니다.`, 'success');
                setTimeout(() => setEditorImageStatus(), 2500);
            } else {
                setEditorImageStatus();
            }
        }

        function scheduleFeaturedImageRender() {
            window.clearTimeout(featuredImageRenderTimer);
            featuredImageRenderTimer = window.setTimeout(renderFeaturedImageControls, 120);
        }

        function editorImageUrls() {
            return extractImageUrlsFromHtml(quill.root.innerHTML);
        }

        function escapeAttribute(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function normalizeFeaturedSelection(urls) {
            if (featuredImageMode === 'selected' && !urls.includes(selectedFeaturedImageUrl)) {
                featuredImageMode = 'auto';
                selectedFeaturedImageUrl = '';
            }

            if (featuredImageMode !== 'selected') {
                selectedFeaturedImageUrl = '';
            }
        }

        function featuredImageUrlForPreview(urls) {
            if (featuredImageMode === 'none') return '';
            if (featuredImageMode === 'selected') return selectedFeaturedImageUrl || '';
            return urls[0] || '';
        }

        function renderFeaturedImageControls() {
            const urls = editorImageUrls();
            normalizeFeaturedSelection(urls);

            const previewUrl = featuredImageUrlForPreview(urls);
            const previewEl = document.getElementById('featuredImagePreview');
            const controlsEl = document.getElementById('featuredImageControls');

            previewEl.innerHTML = previewUrl
                ? `<img src="${escapeAttribute(previewUrl)}" alt="">`
                : '<p class="featured-image-empty">대표 이미지 없음</p>';

            const thumbnails = urls.length > 0
                ? `<div class="featured-image-grid">
                    ${urls.map((url, index) => `
                        <button type="button" class="featured-image-choice ${featuredImageMode === 'selected' && selectedFeaturedImageUrl === url ? 'is-selected' : ''}" data-featured-url="${escapeAttribute(url)}">
                            <img src="${escapeAttribute(url)}" alt="">
                            <span>#${index + 1}</span>
                        </button>
                    `).join('')}
                </div>`
                : '<p class="featured-image-empty">본문 이미지 없음</p>';

            controlsEl.innerHTML = `
                <label class="featured-image-mode">
                    <input type="radio" name="featuredImageMode" value="auto" ${featuredImageMode === 'auto' ? 'checked' : ''}>
                    자동
                </label>
                <label class="featured-image-mode">
                    <input type="radio" name="featuredImageMode" value="none" ${featuredImageMode === 'none' ? 'checked' : ''}>
                    없음
                </label>
                ${thumbnails}
            `;

            controlsEl.querySelectorAll('input[name="featuredImageMode"]').forEach(input => {
                input.addEventListener('change', () => {
                    featuredImageMode = input.value;
                    selectedFeaturedImageUrl = '';
                    renderFeaturedImageControls();
                });
            });

            controlsEl.querySelectorAll('[data-featured-url]').forEach(button => {
                button.addEventListener('click', () => {
                    featuredImageMode = 'selected';
                    selectedFeaturedImageUrl = button.getAttribute('data-featured-url') || '';
                    renderFeaturedImageControls();
                });
            });
        }

        quill.on('text-change', scheduleFeaturedImageRender);

        // 목록 뷰
        function showList() {
            document.getElementById('listView').style.display = 'block';
            document.getElementById('editorView').style.display = 'none';
            editingPostId = null;
            loadPosts();
        }

        // 에디터 뷰
        function showEditor(post = null) {
            document.getElementById('listView').style.display = 'none';
            document.getElementById('editorView').style.display = 'block';

            if (post) {
                // 수정 모드
                document.getElementById('editorTitle').textContent = '✏️ 글 수정';
                document.getElementById('postId').value = post.id;
                document.getElementById('title').value = post.title || '';
                document.getElementById('slug').value = post.slug || '';
                document.getElementById('status').value = post.status || 'draft';
                document.getElementById('published_at').value = post.published_at ? post.published_at.split('T')[0] : '';
                quill.root.innerHTML = post.content || '';
                document.getElementById('deleteBtn').style.display = 'inline-block';
                editingPostId = post.id;
                featuredImageMode = normalizeFeaturedImageMode(post.featured_image_mode);
                selectedFeaturedImageUrl = post.featured_image_url || '';
                renderFeaturedImageControls();
            } else {
                // 새 글 모드
                document.getElementById('editorTitle').textContent = '✍️ 새 글 쓰기';
                document.getElementById('postForm').reset();
                document.getElementById('postId').value = '';
                document.getElementById('slug').value = '';
                document.getElementById('status').value = 'draft';
                quill.root.innerHTML = '';
                document.getElementById('deleteBtn').style.display = 'none';
                editingPostId = null;
                featuredImageMode = 'auto';
                selectedFeaturedImageUrl = '';
                renderFeaturedImageControls();

                // 오늘 날짜 기본값
                document.getElementById('published_at').value = new Date().toISOString().split('T')[0];
            }
        }

        // 글 목록 로드
        async function loadPosts(page = 1) {
            const tbody = document.querySelector('#postsTable tbody');
            tbody.innerHTML = '<tr><td colspan="4" class="loading">불러오는 중</td></tr>';

            try {
                const result = await getAllPosts(page, 10);
                currentPage = page;

                if (result.items.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">아직 글이 없습니다. 첫 번째 글을 작성해보세요!</td></tr>';
                    return;
                }

                tbody.innerHTML = result.items.map(post => `
          <tr>
            <td>
              <a href="javascript:void(0)" onclick="editPost('${post.id}')">${post.title || '(제목 없음)'}</a>
            </td>
            <td><span class="badge badge-${post.status}">${post.status === 'published' ? '발행' : '초안'}</span></td>
            <td>${formatDate(post.published_at || post.created)}</td>
            <td>
              <button class="btn" onclick="editPost('${post.id}')" style="padding: 4px 8px;">✏️</button>
              <button class="btn btn-danger" onclick="confirmDelete('${post.id}')" style="padding: 4px 8px;">🗑️</button>
              ${post.status === 'published' ? `<a href="/posts/view.html?slug=${post.slug}" target="_blank" class="btn" style="padding: 4px 8px; text-decoration: none;">👁️</a>` : ''}
            </td>
          </tr>
        `).join('');

                // 페이지네이션
                renderPagination(result.totalPages, page);
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="4">불러오기 실패: ' + cmsErrorMessage(e) + '</td></tr>';
            }
        }

        // 페이지네이션 렌더링
        function renderPagination(totalPages, currentPage) {
            const paginationEl = document.getElementById('pagination');
            if (totalPages <= 1) {
                paginationEl.innerHTML = '';
                return;
            }

            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                if (i === currentPage) {
                    html += `<span class="current">${i}</span>`;
                } else {
                    html += `<a href="javascript:void(0)" onclick="goToPage(${i})">${i}</a>`;
                }
            }
            paginationEl.innerHTML = html;
        }

        function goToPage(page) {
            loadPosts(page);
        }

        // 글 수정 (ID로 불러오기)
        async function editPost(id) {
            try {
                const post = await pb.collection('posts').getOne(id);
                showEditor(post);
            } catch (e) {
                showAlert('글을 불러올 수 없습니다: ' + cmsErrorMessage(e), 'error');
            }
        }

        // 글 삭제 확인
        async function confirmDelete(id) {
            if (!confirm('정말 이 글을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;

            try {
                await deletePost(id);
                showAlert('글이 삭제되었습니다.', 'success');
                loadPosts(currentPage);
            } catch (e) {
                showAlert('삭제 실패: ' + cmsErrorMessage(e), 'error');
            }
        }

        // 현재 글 삭제
        async function deleteCurrentPost() {
            if (!editingPostId) return;
            await confirmDelete(editingPostId);
            showList();
        }

        // 폼 제출 (저장)
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await savePost();
        });

        // 저장 후 발행
        async function saveAndPublish() {
            document.getElementById('status').value = 'published';
            await savePost();
        }

        // 글 저장
        async function savePost() {
            const id = document.getElementById('postId').value;
            const title = document.getElementById('title').value.trim();
            let slug = document.getElementById('slug').value.trim();
            const status = document.getElementById('status').value;
            const published_at = document.getElementById('published_at').value || null;
            const content = quill.root.innerHTML;

            // 슬러그 자동 생성
            if (!slug) {
                slug = slugify(title) || `post-${Date.now()}`;
                document.getElementById('slug').value = slug;
            }

            normalizeFeaturedSelection(editorImageUrls());

            // FormData 생성
            const formData = new FormData();
            formData.append('title', title);
            formData.append('slug', slug);
            formData.append('status', status);
            formData.append('content', content);
            formData.append('featured_image_mode', normalizeFeaturedImageMode(featuredImageMode));
            formData.append('featured_image_url', featuredImageMode === 'selected' ? selectedFeaturedImageUrl : '');
            if (published_at) formData.append('published_at', published_at);

            try {
                let result;
                if (id) {
                    result = await pb.collection('posts').update(id, formData);
                    showAlert('글이 수정되었습니다!', 'success');
                } else {
                    result = await pb.collection('posts').create(formData);
                    document.getElementById('postId').value = result.id;
                    editingPostId = result.id;
                    document.getElementById('deleteBtn').style.display = 'inline-block';
                    showAlert('글이 저장되었습니다!', 'success');
                }
            } catch (e) {
                showAlert('저장 실패: ' + cmsErrorMessage(e), 'error');
            }
        }

        // 제목 → 내부 URL 슬러그 자동 생성
        document.getElementById('title').addEventListener('input', () => {
            if (!editingPostId) {
                document.getElementById('slug').value = slugify(document.getElementById('title').value);
            }
        });

        // 초기 로드
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('new') === '1') {
            showEditor();
        } else if (urlParams.get('id')) {
            editPost(urlParams.get('id'));
        } else {
            loadPosts();
        }
    </script>
</body>

</html>
