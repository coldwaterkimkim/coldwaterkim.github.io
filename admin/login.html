<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Login — coldwaterkim OWNER MODE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body class="admin-body">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                ★ coldwaterkim OWNER LOGIN ★
            </div>
            <div class="login-body">
                <div id="alert" class="alert" style="display: none;"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="identity">ID</label>
                        <input type="text" id="identity" required autocomplete="username" spellcheck="false">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required autocomplete="current-password">
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary" style="width: 100%;">
                            🔐 LOGIN
                        </button>
                    </div>
                </form>

                <p style="text-align: center; font-size: 12px; color: #666; margin-top: 16px;">
                    <a href="../index.html">← Back to Home</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { pb, isLoggedIn, login, logout, cmsErrorMessage } from '../js/pb.js';

        const params = new URLSearchParams(window.location.search);
        const next = params.get('next') || '/';
        const form = document.getElementById('loginForm');
        const alertEl = document.getElementById('alert');

        function showAlert(message, type) {
            alertEl.textContent = message;
            alertEl.className = `alert alert-${type}`;
            alertEl.style.display = 'block';
        }

        // 이미 로그인되어 있으면 서버에 한 번 더 확인한 뒤 이동한다.
        // 이주/복구 후 낡은 로컬 토큰이 남아 있으면 로그인 화면을 계속 건너뛰는 문제가 생긴다.
        if (isLoggedIn()) {
            try {
                await pb.collection('users').authRefresh();
                window.location.replace(next);
                await new Promise(() => { });
            } catch (err) {
                logout();
                showAlert('로그인 상태가 만료됐어. 다시 로그인해줘.', 'error');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const identity = document.getElementById('identity').value.trim();
            const password = document.getElementById('password').value;

            try {
                await login(identity, password);
                showAlert('로그인 성공! 이동 중...', 'success');
                setTimeout(() => {
                    window.location.href = next;
                }, 500);
            } catch (err) {
                showAlert('로그인 실패: ' + cmsErrorMessage(err), 'error');
            }
        });
    </script>
</body>

</html>
