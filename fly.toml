app = "coldwaterkim-pocketbase"
primary_region = "nrt"

[build]
  dockerfile = "deploy/fly/Dockerfile"

[env]
  PB_DATA_DIR = "/data"
  PB_HTTP = "0.0.0.0:8080"
  PB_ORIGINS = "https://coldwaterkim.com,https://www.coldwaterkim.com"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[mounts]
  source = "pb_data"
  destination = "/data"
  initial_size = "1gb"
  snapshot_retention = 7

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
