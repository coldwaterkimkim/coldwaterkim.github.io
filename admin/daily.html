<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>나으 하루 관리 — coldwaterkim OWNER MODE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body class="admin-body">
    <div class="admin-container">
        <!-- Header -->
        <div class="admin-header">
            <h1>★ coldwaterkim OWNER MODE ★</h1>
            <div>
                <a href="../index.html">🏠 홈으로</a> |
                <a href="#" id="logoutBtn">🚪 로그아웃</a>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="admin-nav">
            <a href="/">🏠 사이트 보기</a>
            <a href="/admin/posts.html">📝 글 관리</a>
            <a href="/admin/daily.html" class="active">📅 나으 하루</a>
            <a href="/admin/media.html">🖼️ 미디어</a>
            <a href="/admin/guestbook.html">💬 방명록</a>
        </nav>

        <!-- Content -->
        <div class="admin-content">
            <div id="alert" class="alert" style="display: none;"></div>

            <!-- 글 목록 뷰 -->
            <div id="listView">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h2 style="margin: 0;">📅 나으 하루 목록</h2>
                    <button class="btn btn-primary" onclick="showEditor()">✚ 새 글 쓰기</button>
                </div>

                <table class="admin-table" id="dailyTable">
                    <thead>
                        <tr>
                            <th>제목</th>
                            <th style="width: 80px;">상태</th>
                            <th style="width: 120px;">날짜</th>
                            <th style="width: 140px;">액션</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="4" class="loading">불러오는 중</td>
                        </tr>
                    </tbody>
                </table>

                <div class="pagination" id="pagination"></div>
            </div>

            <!-- 에디터 뷰 -->
            <div id="editorView" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h2 style="margin: 0;" id="editorTitle">✍️ 새 글 쓰기</h2>
                    <button class="btn" onclick="showList()">← 목록으로</button>
                </div>

                <form id="postForm">
                    <input type="hidden" id="postId">
                    <input type="hidden" id="slug">
                    <input type="hidden" id="status" value="draft">

                    <div class="admin-panel">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="title">제목 *</label>
                                <input type="text" id="title" required placeholder="멋진 제목을 입력하세요">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="published_at">기록 날짜</label>
                                <input type="date" id="published_at">
                            </div>
                        </div>
                    </div>

                    <div class="admin-panel">
                        <h2>본문</h2>
                        <div class="editor-container">
                            <div id="editor"></div>
                        </div>
                        <input type="file" id="editorImageInput" accept="image/*" multiple hidden>
                        <div id="editorImageStatus" class="editor-image-status" aria-live="polite"></div>
                    </div>

                    <div class="action-buttons">
                        <button type="submit" class="btn btn-primary">💾 저장</button>
                        <button type="button" class="btn btn-success" onclick="saveAndPublish()">🚀 저장 후 발행</button>
                        <button type="button" class="btn btn-danger" id="deleteBtn" style="display: none;"
                            onclick="deleteCurrentPost()">🗑️ 삭제</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import {
            pb,
            DAILY_COLLECTION,
            isLoggedIn,
            logout,
            getAllDailyEntries,
            getDailyEntryByDay,
            createDailyEntry,
            updateDailyEntry,
            deleteDailyEntry,
            dailyEntryDayKey,
            dailyEntryDisplayDate,
            dailySlugFromDayKey,
            dailyTitleFromDayKey,
            normalizeDailyDayKey,
            appendDailyContent,
            formatDate,
            cmsErrorMessage,
            uploadMedia,
            getMediaUrl
        } from '../js/pb.js';
        import { createMarkdownEditor, hasImageTransfer, imageFilesFromTransfer } from '../js/markdown-editor.js';

        // 인증 체크
        if (!isLoggedIn()) {
            window.location.replace('/admin/login.html');
            await new Promise(() => { });
        }

        // 로그아웃
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
            window.location.href = '/admin/login.html';
        });

        // Markdown 에디터 초기화
        let pendingEditorImageIndex = null;
        const markdownEditor = await createMarkdownEditor('#editor', {
            placeholder: 'Markdown으로 하루를 작성하세요...',
            onImageButton: () => {
                pendingEditorImageIndex = currentEditorIndex();
                editorImageInput.click();
            }
        });

        const editorContainer = document.querySelector('.editor-container');
        const editorImageInput = document.getElementById('editorImageInput');
        const editorImageStatus = document.getElementById('editorImageStatus');
        const editorImageMimeTypes = new Set(['image/jpeg', 'image/png', 'image/gif', 'image/webp']);

        editorImageInput.addEventListener('change', async () => {
            await insertEditorImages(editorImageInput.files, {
                index: pendingEditorImageIndex
            });
            pendingEditorImageIndex = null;
            editorImageInput.value = '';
        });

        editorContainer.addEventListener('dragenter', (event) => {
            if (!hasImageTransfer(event.dataTransfer)) return;
            event.preventDefault();
            editorContainer.classList.add('is-image-dragover');
        });

        editorContainer.addEventListener('dragover', (event) => {
            if (!hasImageTransfer(event.dataTransfer)) return;
            event.preventDefault();
            editorContainer.classList.add('is-image-dragover');
        });

        editorContainer.addEventListener('dragleave', (event) => {
            if (event.relatedTarget instanceof Node && editorContainer.contains(event.relatedTarget)) return;
            editorContainer.classList.remove('is-image-dragover');
        });

        editorContainer.addEventListener('drop', async (event) => {
            if (!hasImageTransfer(event.dataTransfer)) return;
            event.preventDefault();
            event.stopPropagation();
            editorContainer.classList.remove('is-image-dragover');

            const imageFiles = editorImageFilesFromTransfer(event.dataTransfer);
            if (!imageFiles.length) {
                showAlert('JPG, PNG, GIF, WebP 이미지만 본문에 넣을 수 있습니다.', 'error');
                return;
            }

            await insertEditorImages(imageFiles, {
                index: currentEditorIndex()
            });
        }, true);

        markdownEditor.root.addEventListener('paste', async (event) => {
            if (!hasImageTransfer(event.clipboardData)) return;
            event.preventDefault();
            event.stopPropagation();

            const imageFiles = editorImageFilesFromTransfer(event.clipboardData);
            if (!imageFiles.length) {
                showAlert('JPG, PNG, GIF, WebP 이미지만 본문에 넣을 수 있습니다.', 'error');
                return;
            }

            await insertEditorImages(imageFiles, {
                index: currentEditorIndex()
            });
        }, true);

        // 상태 변수
        let currentPage = 1;
        let editingPostId = null;
        let lastAutoTitle = '';

        // 페이지 함수들을 전역으로 노출
        window.showEditor = showEditor;
        window.showList = showList;
        window.editPost = editPost;
        window.confirmDelete = confirmDelete;
        window.saveAndPublish = saveAndPublish;
        window.deleteCurrentPost = deleteCurrentPost;
        window.goToPage = goToPage;

        // 알림 표시
        function showAlert(message, type) {
            const alertEl = document.getElementById('alert');
            alertEl.textContent = message;
            alertEl.className = `alert alert-${type}`;
            alertEl.style.display = 'block';
            setTimeout(() => alertEl.style.display = 'none', 5000);
        }

        function setEditorImageStatus(message = '', type = 'info') {
            editorImageStatus.textContent = message;
            editorImageStatus.className = `editor-image-status editor-image-status-${type}`;
            editorImageStatus.classList.toggle('is-visible', Boolean(message));
        }

        function isSupportedEditorImage(file) {
            return file && editorImageMimeTypes.has(file.type);
        }

        function editorImageFilesFromTransfer(dataTransfer) {
            return imageFilesFromTransfer(dataTransfer, {
                mimeTypes: editorImageMimeTypes,
                fallbackNamePrefix: 'editor-image'
            });
        }

        function clampEditorIndex(index) {
            return markdownEditor.clampIndex(index);
        }

        function currentEditorIndex() {
            const range = markdownEditor.getSelection(true);
            return clampEditorIndex(range?.index);
        }

        async function insertEditorImages(files, options = {}) {
            const imageFiles = Array.from(files || [])
                .filter(isSupportedEditorImage);

            if (!imageFiles.length) {
                showAlert('JPG, PNG, GIF, WebP 이미지만 본문에 넣을 수 있습니다.', 'error');
                return;
            }

            let insertIndex = clampEditorIndex(options.index);
            let uploadedCount = 0;
            editorContainer.classList.add('is-image-uploading');

            for (let i = 0; i < imageFiles.length; i += 1) {
                const file = imageFiles[i];
                setEditorImageStatus(`이미지 업로드 중... (${i + 1}/${imageFiles.length}) ${file.name}`);

                try {
                    const media = await uploadMedia(file);
                    const url = getMediaUrl(media, media.file);
                    insertIndex = markdownEditor.insertImage(insertIndex, url, file.name);
                    uploadedCount += 1;
                } catch (e) {
                    showAlert(`본문 이미지 업로드 실패 (${file.name}): ${cmsErrorMessage(e)}`, 'error');
                }
            }

            editorContainer.classList.remove('is-image-uploading');

            if (uploadedCount > 0) {
                markdownEditor.setSelection(insertIndex, 0, 'silent');
                setEditorImageStatus(`${uploadedCount}개 이미지가 본문에 들어갔습니다.`, 'success');
                setTimeout(() => setEditorImageStatus(), 2500);
            } else {
                setEditorImageStatus();
            }
        }

        // 목록 뷰
        function showList() {
            document.getElementById('listView').style.display = 'block';
            document.getElementById('editorView').style.display = 'none';
            editingPostId = null;
            loadPosts();
        }

        // 에디터 뷰
        function showEditor(post = null) {
            document.getElementById('listView').style.display = 'none';
            document.getElementById('editorView').style.display = 'block';

            if (post) {
                // 수정 모드
                document.getElementById('editorTitle').textContent = '✏️ 글 수정';
                document.getElementById('postId').value = post.id;
                document.getElementById('title').value = post.title || '';
                document.getElementById('slug').value = post.slug || dailySlugFromDayKey(dailyEntryDayKey(post));
                document.getElementById('status').value = post.status || 'draft';
                document.getElementById('published_at').value = dailyEntryDayKey(post);
                markdownEditor.root.innerHTML = post.content || '';
                document.getElementById('deleteBtn').style.display = 'inline-block';
                editingPostId = post.id;
                lastAutoTitle = '';
            } else {
                // 새 글 모드
                document.getElementById('editorTitle').textContent = '✍️ 새 글 쓰기';
                document.getElementById('postForm').reset();
                document.getElementById('postId').value = '';
                document.getElementById('status').value = 'draft';
                markdownEditor.root.innerHTML = '';
                document.getElementById('deleteBtn').style.display = 'none';
                editingPostId = null;

                // 오늘 날짜 기본값
                setNewDailyDefaults(normalizeDailyDayKey(new Date()));
            }
        }

        function setNewDailyDefaults(dayKey) {
            const normalizedDayKey = normalizeDailyDayKey(dayKey);
            const nextAutoTitle = dailyTitleFromDayKey(normalizedDayKey);
            const titleInput = document.getElementById('title');

            document.getElementById('published_at').value = normalizedDayKey;
            document.getElementById('slug').value = dailySlugFromDayKey(normalizedDayKey);

            if (!editingPostId && (!titleInput.value || titleInput.value === lastAutoTitle)) {
                titleInput.value = nextAutoTitle;
                lastAutoTitle = nextAutoTitle;
            }
        }

        // 글 목록 로드
        async function loadPosts(page = 1) {
            const tbody = document.querySelector('#dailyTable tbody');
            tbody.innerHTML = '<tr><td colspan="4" class="loading">불러오는 중</td></tr>';

            try {
                const result = await getAllDailyEntries(page, 10);
                currentPage = page;

                if (result.items.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">아직 나으 하루가 없습니다. 첫 번째 하루를 작성해보세요!</td></tr>';
                    return;
                }

                tbody.innerHTML = result.items.map(post => `
          <tr>
            <td>
              <a href="javascript:void(0)" onclick="editPost('${post.id}')">${post.title || '(제목 없음)'}</a>
            </td>
            <td><span class="badge badge-${post.status}">${post.status === 'published' ? '발행' : '초안'}</span></td>
            <td>${formatDate(dailyEntryDisplayDate(post))}</td>
            <td>
              <button class="btn" onclick="editPost('${post.id}')" style="padding: 4px 8px;">✏️</button>
              <button class="btn btn-danger" onclick="confirmDelete('${post.id}')" style="padding: 4px 8px;">🗑️</button>
              ${post.status === 'published' ? `<a href="/daily/view.html?slug=${post.slug}" target="_blank" class="btn" style="padding: 4px 8px; text-decoration: none;">👁️</a>` : ''}
            </td>
          </tr>
        `).join('');

                // 페이지네이션
                renderPagination(result.totalPages, page);
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="4">불러오기 실패: ' + cmsErrorMessage(e) + '</td></tr>';
            }
        }

        // 페이지네이션 렌더링
        function renderPagination(totalPages, currentPage) {
            const paginationEl = document.getElementById('pagination');
            if (totalPages <= 1) {
                paginationEl.innerHTML = '';
                return;
            }

            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                if (i === currentPage) {
                    html += `<span class="current">${i}</span>`;
                } else {
                    html += `<a href="javascript:void(0)" onclick="goToPage(${i})">${i}</a>`;
                }
            }
            paginationEl.innerHTML = html;
        }

        function goToPage(page) {
            loadPosts(page);
        }

        // 글 수정 (ID로 불러오기)
        async function editPost(id) {
            try {
                const post = await pb.collection(DAILY_COLLECTION).getOne(id);
                showEditor(post);
            } catch (e) {
                showAlert('글을 불러올 수 없습니다: ' + cmsErrorMessage(e), 'error');
            }
        }

        // 글 삭제 확인
        async function confirmDelete(id) {
            if (!confirm('정말 이 하루 기록을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;

            try {
                await deleteDailyEntry(id);
                showAlert('하루 기록이 삭제되었습니다.', 'success');
                loadPosts(currentPage);
            } catch (e) {
                showAlert('삭제 실패: ' + cmsErrorMessage(e), 'error');
            }
        }

        // 현재 글 삭제
        async function deleteCurrentPost() {
            if (!editingPostId) return;
            await confirmDelete(editingPostId);
            showList();
        }

        // 폼 제출 (저장)
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await savePost();
        });

        // 저장 후 발행
        async function saveAndPublish() {
            document.getElementById('status').value = 'published';
            await savePost();
        }

        // 글 저장
        async function savePost() {
            const id = document.getElementById('postId').value;
            const title = document.getElementById('title').value.trim();
            const status = document.getElementById('status').value;
            const dayKey = normalizeDailyDayKey(document.getElementById('published_at').value || new Date());
            const slug = dailySlugFromDayKey(dayKey);
            const content = markdownEditor.root.innerHTML;

            document.getElementById('slug').value = slug;
            document.getElementById('published_at').value = dayKey;

            try {
                let result;
                if (id) {
                    const formData = dailyFormData({
                        title,
                        slug,
                        dayKey,
                        status,
                        content
                    });
                    result = await updateDailyEntry(id, formData);
                    showAlert('글이 수정되었습니다!', 'success');
                } else {
                    const existingDaily = await getDailyEntryByDay(dayKey, true);

                    if (existingDaily) {
                        const mergedContent = appendDailyContent(existingDaily.content, content);
                        const mergedStatus = status === 'published' || existingDaily.status === 'published'
                            ? 'published'
                            : 'draft';
                        const formData = dailyFormData({
                            title: existingDaily.title || title || dailyTitleFromDayKey(dayKey),
                            slug: existingDaily.slug || slug,
                            dayKey,
                            status: mergedStatus,
                            content: mergedContent,
                            publishedAt: existingDaily.published_at || dayKey
                        });

                        result = await updateDailyEntry(existingDaily.id, formData);
                        document.getElementById('postId').value = result.id;
                        document.getElementById('title').value = result.title || title;
                        document.getElementById('status').value = result.status || mergedStatus;
                        markdownEditor.root.innerHTML = result.content || mergedContent;
                        editingPostId = result.id;
                        document.getElementById('deleteBtn').style.display = 'inline-block';
                        showAlert('이미 있던 오늘의 나으 하루 아래에 이어 붙였습니다!', 'success');
                    } else {
                        const formData = dailyFormData({
                            title: title || dailyTitleFromDayKey(dayKey),
                            slug,
                            dayKey,
                            status,
                            content
                        });

                        result = await createDailyEntry(formData);
                        document.getElementById('postId').value = result.id;
                        editingPostId = result.id;
                        document.getElementById('deleteBtn').style.display = 'inline-block';
                        showAlert('글이 저장되었습니다!', 'success');
                    }
                }
            } catch (e) {
                showAlert('저장 실패: ' + cmsErrorMessage(e), 'error');
            }
        }

        function dailyFormData({ title, slug, dayKey, status, content, publishedAt = null }) {
            const formData = new FormData();
            formData.append('title', title || dailyTitleFromDayKey(dayKey));
            formData.append('slug', slug || dailySlugFromDayKey(dayKey));
            formData.append('day_key', dayKey);
            formData.append('status', status || 'draft');
            formData.append('content', content || '');
            formData.append('published_at', publishedAt || dayKey);
            return formData;
        }

        document.getElementById('published_at').addEventListener('change', () => {
            if (editingPostId) return;
            setNewDailyDefaults(document.getElementById('published_at').value || new Date());
        });

        // 초기 로드
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('new') === '1') {
            showEditor();
        } else if (urlParams.get('id')) {
            editPost(urlParams.get('id'));
        } else {
            loadPosts();
        }
    </script>
</body>

</html>
