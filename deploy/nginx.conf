server {
    listen 80;
    server_name coldwaterkim.com www.coldwaterkim.com;

    # Cloudflare에서 HTTPS 처리 (Full SSL 모드)

    root /var/www/coldwaterkim/dist;
    index index.html;

    # 큰 파일 업로드 허용 (영상 100MB)
    client_max_body_size 150M;

    # ─────────────────────────────────────────
    # Route 1: PocketBase API
    # /api/* → PocketBase:8090/api/*
    # ─────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8090/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 큰 파일 업로드 타임아웃
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # ─────────────────────────────────────────
    # Route 2: PocketBase 내장 Admin UI
    # /_/* → PocketBase:8090/_/*
    # (비상용 - 평소는 /admin 사용)
    # ─────────────────────────────────────────
    location /_/ {
        proxy_pass http://127.0.0.1:8090/_/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────
    # Route 3: 커스텀 관리자 페이지
    # /admin → /var/www/coldwaterkim/dist/admin/
    # ─────────────────────────────────────────
    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # ─────────────────────────────────────────
    # Route 4: 정적 파일 (기본)
    # /* → /var/www/coldwaterkim/dist/*
    # ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    # 캐싱 (CSS/JS/이미지)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|webp|mp3|mp4|webm|pdf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
